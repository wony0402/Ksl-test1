<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KSL 시퀀스 수집기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0d0d12;--panel:#13131e;--card:#1a1a28;
  --border:#252538;--accent:#7c6dfa;--green:#3dd68c;
  --red:#fa5c5c;--yellow:#fac96d;--text:#eeeef5;--muted:#60607a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}

header{padding:11px 18px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);font-weight:500}
.hbadge{font-size:10px;color:var(--muted);margin-left:auto;font-family:'DM Mono',monospace}

main{display:flex;flex:1;overflow:hidden}

/* 왼쪽 단어 패널 */
.wpanel{width:190px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.wpanel-top{padding:10px 12px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.wlist{flex:1;overflow-y:auto;padding:6px}
.wlist::-webkit-scrollbar{width:3px}
.wlist::-webkit-scrollbar-thumb{background:var(--border)}
.wbtn{width:100%;display:flex;align-items:center;gap:8px;padding:7px 9px;background:transparent;border:1.5px solid transparent;border-radius:9px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;margin-bottom:3px;transition:all .15s;text-align:left}
.wbtn:hover{background:var(--card);border-color:var(--border)}
.wbtn.sel{background:var(--card);border-color:var(--accent)}
.wbtn.done{border-color:var(--green)}
.wemoji{font-size:15px;flex-shrink:0}
.wname{flex:1;font-weight:600}
.wcnt{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);flex-shrink:0}
.wbtn.done .wcnt{color:var(--green)}
.wpanel-bot{padding:10px;border-top:1px solid var(--border)}
.tot{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-align:center;margin-bottom:7px}
.savebtn{width:100%;padding:9px;background:var(--accent);border:none;border-radius:9px;color:white;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
.savebtn:disabled{opacity:.3;cursor:not-allowed}

/* 오른쪽 카메라 영역 */
.camarea{flex:1;display:flex;flex-direction:column;overflow:hidden}
.camwrap{flex:1;position:relative;background:#050508;overflow:hidden}
#vid{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
#cvs{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}

/* 상단 배지 */
.topbadge{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:22px;padding:7px 18px;display:flex;align-items:center;gap:10px;white-space:nowrap;transition:border-color .3s}
.topbadge.recording{border-color:var(--red)}
.tb-emoji{font-size:20px}
.tb-word{font-size:16px;font-weight:700}
.tb-hint{font-size:10px;color:var(--muted)}

/* 손 감지 표시 */
.hand-status{position:absolute;top:58px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.hpill{padding:4px 12px;border-radius:14px;font-size:10px;font-family:'DM Mono',monospace;background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--muted);transition:all .2s;white-space:nowrap}
.hpill.on{border-color:var(--green);color:var(--green)}

/* 프레임 카운터 */
.frame-counter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;transition:opacity .2s;pointer-events:none}
.frame-counter.show{opacity:1}
.fc-num{font-size:72px;font-weight:900;color:white;font-family:'DM Mono',monospace;text-shadow:0 0 40px rgba(124,109,250,.8);line-height:1}
.fc-bar-wrap{width:200px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
.fc-bar{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .05s linear}
.fc-label{font-size:11px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}

/* 카운트다운 */
.countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:96px;font-weight:900;color:white;font-family:'DM Mono',monospace;text-shadow:0 0 60px var(--accent);opacity:0;transition:opacity .15s;pointer-events:none}
.countdown.show{opacity:1}

/* 결과 팝업 */
.result-pop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--green);color:#0d0d12;font-size:18px;font-weight:900;padding:14px 28px;border-radius:18px;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
.result-pop.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* 녹화 버튼 */
.recbtn{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:70px;height:70px;border-radius:50%;background:var(--red);border:4px solid rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .1s,box-shadow .2s;box-shadow:0 4px 24px rgba(250,92,92,.4)}
.recbtn:active{transform:translateX(-50%) scale(.92)}
.recbtn.recording{box-shadow:0 0 0 6px rgba(250,92,92,.3),0 4px 24px rgba(250,92,92,.4);animation:recring 1s infinite}
@keyframes recring{0%,100%{box-shadow:0 0 0 6px rgba(250,92,92,.3),0 4px 24px rgba(250,92,92,.4)}50%{box-shadow:0 0 0 12px rgba(250,92,92,.1),0 4px 24px rgba(250,92,92,.4)}}
.recbtn:disabled{opacity:.4;cursor:not-allowed;animation:none}

/* 자동반복 토글 */
.autowrap{position:absolute;bottom:24px;right:16px;display:flex;flex-direction:column;align-items:center;gap:4px}
.autolbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.toggle{width:42px;height:24px;background:var(--border);border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}

/* 언두 */
.undobtn{position:absolute;bottom:24px;left:16px;padding:7px 13px;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* 시작 오버레이 */
.startov{position:absolute;inset:0;background:rgba(13,13,18,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20}
.startov.gone{display:none}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loadmsg{font-size:13px;color:var(--muted)}
.startbtn{padding:13px 36px;background:var(--accent);border:none;border-radius:13px;color:white;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:none;box-shadow:0 6px 22px rgba(124,109,250,.4)}

/* 하단 바 */
.botbar{height:50px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.botinfo{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;flex:1}

/* 코너 프레임 */
.corner{position:absolute;width:26px;height:26px;border-color:rgba(255,255,255,.2);border-style:solid}
.c-tl{top:36px;left:16px;border-width:2px 0 0 2px}
.c-tr{top:36px;right:16px;border-width:2px 2px 0 0}
.c-bl{bottom:100px;left:16px;border-width:0 0 2px 2px}
.c-br{bottom:100px;right:16px;border-width:0 2px 2px 0}

/* 미니 시퀀스 프리뷰 */
.seq-preview{position:absolute;top:12px;right:16px;display:flex;gap:2px;align-items:center}
.seq-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .05s}
.seq-dot.filled{background:var(--green)}
.seq-dot.current{background:var(--accent)}
</style>
</head>
<body>
<header>
  <div class="logo">✋ KSL — 시퀀스 수집기</div>
  <div class="hbadge" id="hbadge">양손 · 30프레임 · LSTM용</div>
</header>
<main>
  <!-- 단어 목록 -->
  <div class="wpanel">
    <div class="wpanel-top">수화 단어 (20개)</div>
    <div class="wlist" id="wlist"></div>
    <div class="wpanel-bot">
      <div class="tot" id="totTxt">총 0 시퀀스</div>
      <button class="savebtn" id="savebtn" onclick="saveData()" disabled>📥 JSON 저장</button>
    </div>
  </div>

  <!-- 카메라 -->
  <div class="camarea">
    <div class="camwrap">
      <video id="vid" playsinline autoplay muted></video>
      <canvas id="cvs"></canvas>

      <div class="corner c-tl"></div>
      <div class="corner c-tr"></div>
      <div class="corner c-bl"></div>
      <div class="corner c-br"></div>

      <div class="topbadge" id="topbadge">
        <span class="tb-emoji" id="tbEmoji">👆</span>
        <div>
          <div class="tb-word" id="tbWord">단어를 선택하세요</div>
          <div class="tb-hint" id="tbHint">왼쪽에서 수화 단어를 고르세요</div>
        </div>
      </div>

      <div class="hand-status">
        <div class="hpill" id="hpillL">왼손 ✗</div>
        <div class="hpill" id="hpillR">오른손 ✗</div>
      </div>

      <!-- 시퀀스 점 프리뷰 -->
      <div class="seq-preview" id="seqPreview"></div>

      <!-- 카운트다운 -->
      <div class="countdown" id="countdown"></div>

      <!-- 프레임 카운터 -->
      <div class="frame-counter" id="frameCounter">
        <div class="fc-num" id="fcNum">0</div>
        <div class="fc-bar-wrap"><div class="fc-bar" id="fcBar"></div></div>
        <div class="fc-label" id="fcLabel">프레임 캡처 중...</div>
      </div>

      <!-- 결과 팝업 -->
      <div class="result-pop" id="resultPop"></div>

      <!-- 녹화 버튼 -->
      <button class="recbtn" id="recbtn" onclick="startRecording()" disabled>⏺</button>

      <!-- 자동 반복 -->
      <div class="autowrap">
        <div class="autolbl">자동반복</div>
        <button class="toggle" id="autoToggle" onclick="toggleAuto()"></button>
      </div>

      <!-- 언두 -->
      <button class="undobtn" onclick="undoLast()">↩ 취소</button>

      <!-- 시작 오버레이 -->
      <div class="startov" id="startov">
        <div class="spinner" id="spinner"></div>
        <p class="loadmsg" id="loadmsg">MediaPipe 로딩 중...</p>
        <button class="startbtn" id="startbtn" onclick="startCam()">📷 카메라 시작</button>
      </div>
    </div>
    <div class="botbar">
      <span class="botinfo" id="botinfo">단어를 선택하고 ⏺ 버튼을 누르세요</span>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ══════════════════════════════════════════
// 설정
// ══════════════════════════════════════════
const SEQ_LEN = 30;      // 프레임 수
const TARGET  = 50;      // 단어당 목표 시퀀스 수
const COUNTDOWN_SEC = 2; // 녹화 전 카운트다운

const WORDS = [
  {id:'hello',     emoji:'👋', word:'안녕',     hands:'양손', tip:'양손 펴서 흔들기'},
  {id:'thanks',    emoji:'🙏', word:'감사합니다', hands:'양손', tip:'양손 손끝 모아 앞으로'},
  {id:'love',      emoji:'❤️', word:'사랑해',    hands:'양손', tip:'왼손 주먹 위 오른손 빙글'},
  {id:'rice',      emoji:'🍚', word:'밥',        hands:'양손', tip:'그릇 모양 + 숟가락질'},
  {id:'water',     emoji:'💧', word:'물',        hands:'한손', tip:'W모양 입 근처 흔들기'},
  {id:'school',    emoji:'🏫', word:'학교',      hands:'양손', tip:'검지 맞대 지붕 모양'},
  {id:'study',     emoji:'📚', word:'공부',      hands:'양손', tip:'책 펼치는 동작'},
  {id:'friend',    emoji:'🤝', word:'친구',      hands:'양손', tip:'검지 나란히 붙이기'},
  {id:'mom',       emoji:'👩', word:'엄마',      hands:'한손', tip:'엄지로 턱 두드리기'},
  {id:'dad',       emoji:'👨', word:'아빠',      hands:'한손', tip:'엄지로 이마 두드리기'},
  {id:'sorry',     emoji:'🙏', word:'미안해',    hands:'한손', tip:'주먹으로 가슴 원 그리기'},
  {id:'hungry',    emoji:'🍽️', word:'배고파',    hands:'한손', tip:'손바닥으로 배 문지르기'},
  {id:'tired',     emoji:'😫', word:'피곤해',    hands:'양손', tip:'양손 아래로 늘어뜨리기'},
  {id:'happy',     emoji:'😊', word:'행복해',    hands:'양손', tip:'양손 가슴→위로 올리기'},
  {id:'good',      emoji:'👍', word:'좋아',      hands:'한손', tip:'엄지 위로'},
  {id:'bad',       emoji:'🚫', word:'싫어',      hands:'한손', tip:'손 앞으로 밀기'},
  {id:'help',      emoji:'🆘', word:'도와줘',    hands:'양손', tip:'주먹을 손바닥이 받쳐 올리기'},
  {id:'dunno',     emoji:'🤷', word:'모르겠어',  hands:'양손', tip:'양손 어깨 으쓱'},
  {id:'toilet',    emoji:'🚻', word:'화장실',    hands:'한손', tip:'검지 구부렸다 폄'},
  {id:'home',      emoji:'🏠', word:'집',        hands:'양손', tip:'양손으로 지붕+벽 모양'},
];

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
// dataset: { wordId: [ sequence, ... ] }
// sequence: 30개 프레임 배열
// 프레임: { left: [[x,y,z]×21] or null, right: [[x,y,z]×21] or null }
let dataset = {};
WORDS.forEach(w => dataset[w.id] = []);

let currentWord   = null;
let handsModel    = null;
let isRecording   = false;
let currentSeq    = [];   // 현재 녹화 중인 시퀀스
let autoMode      = false;
let autoTimer     = null;
let latestLM      = {left: null, right: null};
let countdownTimer = null;

// ══════════════════════════════════════════
// 시퀀스 점 프리뷰 렌더
// ══════════════════════════════════════════
function renderSeqDots() {
  const wrap = document.getElementById('seqPreview');
  wrap.innerHTML = Array.from({length: SEQ_LEN}, (_, i) => {
    let cls = 'seq-dot';
    if (i < currentSeq.length - 1) cls += ' filled';
    else if (i === currentSeq.length - 1 && isRecording) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
}

// ══════════════════════════════════════════
// 단어 목록 렌더
// ══════════════════════════════════════════
function renderWordList() {
  const list = document.getElementById('wlist');
  list.innerHTML = WORDS.map(w => {
    const cnt = dataset[w.id].length;
    const done = cnt >= TARGET;
    return `<button class="wbtn ${done?'done':''} ${currentWord?.id===w.id?'sel':''}"
      id="wbtn-${w.id}" onclick="selectWord('${w.id}')">
      <span class="wemoji">${w.emoji}</span>
      <span class="wname">${w.word}</span>
      <span class="wcnt">${cnt}/${TARGET}</span>
    </button>`;
  }).join('');
  const total = WORDS.reduce((s,w) => s + dataset[w.id].length, 0);
  document.getElementById('totTxt').textContent = `총 ${total} 시퀀스`;
  document.getElementById('savebtn').disabled = total === 0;
}

function selectWord(id) {
  if (isRecording) return;
  currentWord = WORDS.find(w => w.id === id);
  document.getElementById('tbEmoji').textContent = currentWord.emoji;
  document.getElementById('tbWord').textContent   = currentWord.word;
  document.getElementById('tbHint').textContent   = currentWord.tip + ` (${currentWord.hands})`;
  document.getElementById('recbtn').disabled = false;
  updateBotInfo();
  renderWordList();
  renderSeqDots();
}

function updateBotInfo() {
  if (!currentWord) return;
  const cnt = dataset[currentWord.id].length;
  document.getElementById('botinfo').textContent =
    `${currentWord.word} — ${cnt}개 완료 / ${TARGET - cnt}개 남음`;
}

// ══════════════════════════════════════════
// 녹화 (카운트다운 → 30프레임 캡처)
// ══════════════════════════════════════════
function startRecording() {
  if (!currentWord || isRecording) return;
  if (dataset[currentWord.id].length >= TARGET) { showPop('✅ 이미 완료!'); return; }

  // 카운트다운
  let count = COUNTDOWN_SEC;
  const cdEl = document.getElementById('countdown');
  document.getElementById('recbtn').disabled = true;

  const tick = () => {
    cdEl.textContent = count;
    cdEl.classList.add('show');
    if (count === 0) {
      cdEl.classList.remove('show');
      beginCapture();
    } else {
      count--;
      countdownTimer = setTimeout(tick, 700);
    }
  };
  tick();
}

function beginCapture() {
  isRecording = true;
  currentSeq  = [];
  document.getElementById('topbadge').classList.add('recording');
  document.getElementById('recbtn').classList.add('recording');
  document.getElementById('recbtn').textContent = '⏹';
  document.getElementById('recbtn').disabled = false;
  document.getElementById('recbtn').onclick = stopRecording;
  document.getElementById('frameCounter').classList.add('show');
}

function stopRecording() {
  isRecording = false;
  document.getElementById('topbadge').classList.remove('recording');
  document.getElementById('recbtn').classList.remove('recording');
  document.getElementById('recbtn').textContent = '⏺';
  document.getElementById('recbtn').onclick = startRecording;
  document.getElementById('frameCounter').classList.remove('show');
  currentSeq = [];
  renderSeqDots();
  if (autoMode) scheduleAuto();
}

function captureFrame() {
  if (!isRecording || !currentWord) return;

  const frame = {
    left:  latestLM.left  ? latestLM.left.map(p  => [+p.x.toFixed(4),+p.y.toFixed(4),+p.z.toFixed(4)]) : null,
    right: latestLM.right ? latestLM.right.map(p => [+p.x.toFixed(4),+p.y.toFixed(4),+p.z.toFixed(4)]) : null,
  };
  currentSeq.push(frame);

  // UI 업데이트
  const pct = (currentSeq.length / SEQ_LEN * 100).toFixed(0);
  document.getElementById('fcNum').textContent   = currentSeq.length;
  document.getElementById('fcBar').style.width   = pct + '%';
  document.getElementById('fcLabel').textContent = `/ ${SEQ_LEN} 프레임`;
  renderSeqDots();

  if (currentSeq.length >= SEQ_LEN) {
    // 시퀀스 완료
    dataset[currentWord.id].push([...currentSeq]);
    const cnt = dataset[currentWord.id].length;
    showPop(`${currentWord.emoji} ${cnt}/${TARGET}`);
    stopRecording();
    renderWordList();
    updateBotInfo();
  }
}

function undoLast() {
  if (!currentWord || isRecording) return;
  if (dataset[currentWord.id].length > 0) {
    dataset[currentWord.id].pop();
    renderWordList();
    updateBotInfo();
  }
}

// ══════════════════════════════════════════
// 자동 반복
// ══════════════════════════════════════════
function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('autoToggle').classList.toggle('on', autoMode);
  if (autoMode && !isRecording && currentWord) scheduleAuto();
  else clearTimeout(autoTimer);
}

function scheduleAuto() {
  clearTimeout(autoTimer);
  if (!autoMode || !currentWord || dataset[currentWord.id].length >= TARGET) return;
  autoTimer = setTimeout(() => { if (!isRecording) startRecording(); }, 1200);
}

function showPop(msg) {
  const el = document.getElementById('resultPop');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ══════════════════════════════════════════
// JSON 저장
// ══════════════════════════════════════════
function saveData() {
  const out = {
    version: '2.0',
    type: 'sequence',
    seq_len: SEQ_LEN,
    landmarks_per_hand: 21,
    features_per_landmark: 3,
    date: new Date().toISOString(),
    words: WORDS.map(w => ({
      id: w.id, word: w.word, emoji: w.emoji,
      hands: w.hands, count: dataset[w.id].length,
      sequences: dataset[w.id]
    })).filter(w => w.count > 0)
  };
  const blob = new Blob([JSON.stringify(out)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ksl_seq_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ══════════════════════════════════════════
// MediaPipe
// ══════════════════════════════════════════
async function initMP() {
  handsModel = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  handsModel.setOptions({maxNumHands:2, modelComplexity:1, minDetectionConfidence:.7, minTrackingConfidence:.6});
  handsModel.onResults(onResults);
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('loadmsg').textContent   = '준비 완료!';
  document.getElementById('startbtn').style.display = 'block';
}

async function startCam() {
  document.getElementById('startbtn').disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('loadmsg').textContent = '카메라 연결 중...';
  const vid = document.getElementById('vid');
  const cvs = document.getElementById('cvs');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:'user', width:{ideal:1280}, height:{ideal:720}}
    });
    vid.srcObject = stream;
    await vid.play();
    cvs.width  = vid.videoWidth  || 1280;
    cvs.height = vid.videoHeight || 720;
    document.getElementById('startov').classList.add('gone');
    new Camera(vid, {
      onFrame: async () => { await handsModel.send({image: vid}); },
      width: cvs.width, height: cvs.height
    }).start();
  } catch(e) {
    document.getElementById('loadmsg').textContent = '오류: ' + e.message;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('startbtn').disabled = false;
  }
}

function onResults(results) {
  const cvs = document.getElementById('cvs');
  const vid = document.getElementById('vid');
  const ctx = cvs.getContext('2d');
  if (vid.videoWidth > 0 && cvs.width !== vid.videoWidth) {
    cvs.width = vid.videoWidth; cvs.height = vid.videoHeight;
  }

  ctx.save();
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.scale(-1,1); ctx.translate(-cvs.width,0);
  ctx.drawImage(results.image,0,0,cvs.width,cvs.height);

  const hands   = results.multiHandLandmarks  || [];
  const handedness = results.multiHandedness || [];

  // 손 리셋
  latestLM = {left: null, right: null};

  hands.forEach((lm, i) => {
    // MediaPipe는 미러 기준이라 left/right 반전
    const label = handedness[i]?.label === 'Left' ? 'right' : 'left';
    latestLM[label] = lm;

    const color = label === 'right' ? '#7c6dfa' : '#3dd68c';
    drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: color+'99', lineWidth:2});
    drawLandmarks(ctx, lm, {color, fillColor: color+'33', lineWidth:1, radius:4});

    // 손 라벨
    const wx = lm[0].x * cvs.width, wy = lm[0].y * cvs.height;
    ctx.fillStyle = color;
    ctx.font = 'bold 12px DM Mono, monospace';
    const lbl = label === 'right' ? '오른손' : '왼손';
    const tw = ctx.measureText(lbl).width;
    ctx.fillRect(wx - tw/2 - 6, wy - 32, tw + 12, 20);
    ctx.fillStyle = 'white'; ctx.textAlign = 'center';
    ctx.fillText(lbl, wx, wy - 17);
    ctx.textAlign = 'left';
  });
  ctx.restore();

  // 손 상태 UI
  document.getElementById('hpillL').classList.toggle('on', !!latestLM.left);
  document.getElementById('hpillR').classList.toggle('on', !!latestLM.right);
  document.getElementById('hpillL').textContent = latestLM.left  ? '왼손 ✓' : '왼손 ✗';
  document.getElementById('hpillR').textContent = latestLM.right ? '오른손 ✓' : '오른손 ✗';

  // 녹화 중이면 프레임 캡처
  if (isRecording) captureFrame();
}
