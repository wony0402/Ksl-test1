<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한국 수화 인식기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #f5f0e8;
  --panel: #ede8df;
  --card: #fff;
  --border: #d8d0c4;
  --accent: #e8532a;
  --accent2: #2a6ee8;
  --accent3: #2ab87a;
  --text: #1a1612;
  --muted: #8a8078;
  --success: #2ab87a;
  --warn: #e8a82a;
  --shadow: rgba(26,22,18,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── 헤더 ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--text);
  flex-shrink: 0;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--bg);
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  font-family: 'DM Mono', monospace;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--warn);
  animation: blink 1.5s infinite;
}
.status-dot.on { background: var(--success); animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── 메인 ── */
main {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* ── 왼쪽 가이드 ── */
.guide {
  width: 260px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.guide-top {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.guide-top h2 {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

.sign-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sign-list::-webkit-scrollbar { width: 3px; }
.sign-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sign-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
}
.sign-item:active { transform: scale(0.98); }
.sign-item.active {
  border-color: var(--accent);
  background: #fff8f6;
}
.sign-item.detected {
  border-color: var(--success);
  background: #f0fdf6;
  animation: pop 0.35s ease;
}
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)} }

.sign-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
.sign-info { flex: 1; min-width: 0; }
.sign-word {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.sign-how {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sign-check {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--success);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: white;
  opacity: 0;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
.sign-item.detected .sign-check { opacity: 1; }

/* 카테고리 구분선 */
.cat-divider {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 4px 4px;
}

/* 팁 */
.tip-box {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 70px;
}
.tip-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.tip-text {
  font-size: 11px;
  color: var(--text);
  line-height: 1.6;
}

/* ── 오른쪽 캠 ── */
.cam-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.cam-wrap {
  flex: 1;
  position: relative;
  background: #111;
  overflow: hidden;
}

#videoEl {
  position: absolute;
  width: 1px; height: 1px;
  opacity: 0; pointer-events: none;
}

#canvasEl {
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  display: block;
}

/* 손 수 표시 */
.hand-count {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 7px 16px;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  font-family: 'DM Mono', monospace;
  transition: all 0.3s;
  white-space: nowrap;
}
.hand-count.has-hands {
  color: var(--success);
  border-color: rgba(42,184,122,0.4);
}
.hand-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* 손 라벨 (L/R) */
.hand-label-badge {
  position: absolute;
  background: var(--accent2);
  color: white;
  font-size: 11px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  padding: 3px 8px;
  border-radius: 6px;
  pointer-events: none;
  transform: translate(-50%, -130%);
  white-space: nowrap;
}

/* 결과 표시 */
.result-box {
  position: absolute;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  pointer-events: none;
}
.result-word {
  font-size: 52px;
  font-weight: 900;
  color: white;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  opacity: 0;
  transform: translateY(8px) scale(0.95);
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}
.result-word.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.result-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-family: 'DM Mono', monospace;
  opacity: 0;
  transition: opacity 0.25s;
}
.result-sub.show { opacity: 1; }

/* 코너 프레임 */
.frame-tl, .frame-tr, .frame-bl, .frame-br {
  position: absolute;
  width: 28px; height: 28px;
  border-color: rgba(255,255,255,0.3);
  border-style: solid;
}
.frame-tl { top: 36px; left: 20px; border-width: 2px 0 0 2px; }
.frame-tr { top: 36px; right: 20px; border-width: 2px 2px 0 0; }
.frame-bl { bottom: 70px; left: 20px; border-width: 0 0 2px 2px; }
.frame-br { bottom: 70px; right: 20px; border-width: 0 2px 2px 0; }

/* 시작 오버레이 */
.start-overlay {
  position: absolute; inset: 0;
  background: rgba(26,22,18,0.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 20;
}
.start-overlay.gone { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 2.5px solid rgba(255,255,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-msg { font-size: 13px; color: rgba(255,255,255,0.5); }
.start-btn {
  padding: 15px 44px;
  background: var(--accent);
  border: none; border-radius: 14px;
  color: white; font-size: 17px; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(232,83,42,0.4);
  display: none;
  transition: transform 0.15s;
}
.start-btn:active { transform: scale(0.96); }
.hint-msg { font-size: 11px; color: rgba(255,255,255,0.3); display: none; }

/* 히스토리 */
.history {
  height: 50px;
  background: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  overflow-x: auto;
  flex-shrink: 0;
}
.history::-webkit-scrollbar { height: 0; }
.hist-label { font-size: 10px; color: rgba(255,255,255,0.3); white-space: nowrap; flex-shrink: 0; font-family: 'DM Mono', monospace; }
.hist-chip {
  flex-shrink: 0;
  padding: 4px 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  font-size: 13px;
  font-weight: 700;
  color: white;
  animation: chipIn 0.25s ease;
}
@keyframes chipIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
.clear-btn {
  margin-left: auto; flex-shrink: 0;
  padding: 4px 10px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: rgba(255,255,255,0.3);
  font-size: 10px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<header>
  <div class="logo">✋ <span>KSL</span>.ai</div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">준비 중</span>
    </div>
  </div>
</header>

<main>
  <!-- 왼쪽 가이드 -->
  <div class="guide">
    <div class="guide-top"><h2>📖 수화 사전</h2></div>
    <div class="sign-list" id="signList"></div>
    <div class="tip-box">
      <div class="tip-label">💡 동작 설명</div>
      <div class="tip-text" id="tipText">카드를 눌러 설명을 확인하세요.</div>
    </div>
  </div>

  <!-- 오른쪽 카메라 -->
  <div class="cam-area">
    <div class="cam-wrap">
      <video id="videoEl" playsinline autoplay muted></video>
      <canvas id="canvasEl"></canvas>

      <div class="frame-tl"></div>
      <div class="frame-tr"></div>
      <div class="frame-bl"></div>
      <div class="frame-br"></div>

      <div class="hand-count" id="handCount">
        <div class="hand-dot"></div>
        손을 카메라에 보여주세요
      </div>

      <div class="result-box">
        <div class="result-word" id="resultWord"></div>
        <div class="result-sub" id="resultSub"></div>
      </div>

      <div class="start-overlay" id="startOverlay">
        <div class="spinner" id="spinner"></div>
        <p class="load-msg" id="loadMsg">MediaPipe 로딩 중...</p>
        <button class="start-btn" id="startBtn" onclick="startCamera()">📷 카메라 시작</button>
        <p class="hint-msg" id="hintMsg">카메라 권한을 허용해 주세요</p>
      </div>
    </div>

    <div class="history">
      <span class="hist-label">기록:</span>
      <div id="histChips" style="display:flex;gap:6px;align-items:center;"></div>
      <button class="clear-btn" onclick="clearHist()">지우기</button>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ══════════════════════════════════════════
// 손가락 분석 유틸
// ══════════════════════════════════════════
const TIP  = [0,4,8,12,16,20];
const MID  = [0,3,6,10,14,18];
const PIP  = [0,2,5,9,13,17];

function fingerUp(lm, f) {
  // f: 1=검지 2=중지 3=약지 4=소지
  return lm[TIP[f]].y < lm[MID[f]].y - 0.025;
}
function thumbUp(lm) { return lm[4].y < lm[3].y - 0.02; }
function thumbDown(lm) { return lm[4].y > lm[3].y + 0.02; }
function thumbOut(lm) { return Math.abs(lm[4].x - lm[3].x) > 0.06; }

function allFingersUp(lm) {
  return fingerUp(lm,1)&&fingerUp(lm,2)&&fingerUp(lm,3)&&fingerUp(lm,4);
}
function noFingersUp(lm) {
  return !fingerUp(lm,1)&&!fingerUp(lm,2)&&!fingerUp(lm,3)&&!fingerUp(lm,4);
}
function isFist(lm) { return noFingersUp(lm) && !thumbUp(lm); }
function isOpenPalm(lm) { return allFingersUp(lm) && thumbOut(lm); }
function isPointing(lm) {
  return fingerUp(lm,1) && !fingerUp(lm,2) && !fingerUp(lm,3) && !fingerUp(lm,4);
}
function isPeace(lm) {
  return fingerUp(lm,1) && fingerUp(lm,2) && !fingerUp(lm,3) && !fingerUp(lm,4);
}
function isThumbsUp(lm) {
  return thumbUp(lm) && noFingersUp(lm);
}
function isThumbsDown(lm) {
  return thumbDown(lm) && noFingersUp(lm);
}
function isPinch(lm) {
  const dx = lm[4].x - lm[8].x;
  const dy = lm[4].y - lm[8].y;
  return Math.sqrt(dx*dx+dy*dy) < 0.06 && !fingerUp(lm,2) && !fingerUp(lm,3) && !fingerUp(lm,4);
}
function isThreeFingersUp(lm) {
  return fingerUp(lm,1)&&fingerUp(lm,2)&&fingerUp(lm,3)&&!fingerUp(lm,4);
}
function isFourFingersUp(lm) {
  return fingerUp(lm,1)&&fingerUp(lm,2)&&fingerUp(lm,3)&&fingerUp(lm,4)&&!thumbOut(lm);
}
function isCallMe(lm) { // 엄지+소지
  return thumbUp(lm) && !fingerUp(lm,1) && !fingerUp(lm,2) && !fingerUp(lm,3) && fingerUp(lm,4);
}
function isGun(lm) { // 엄지+검지 L shape
  return thumbOut(lm) && fingerUp(lm,1) && !fingerUp(lm,2) && !fingerUp(lm,3) && !fingerUp(lm,4);
}
function isMiddleUp(lm) {
  return !fingerUp(lm,1) && fingerUp(lm,2) && !fingerUp(lm,3) && !fingerUp(lm,4);
}
function isRingUp(lm) {
  return !fingerUp(lm,1) && !fingerUp(lm,2) && fingerUp(lm,3) && !fingerUp(lm,4);
}
function isPinkyUp(lm) {
  return !fingerUp(lm,1) && !fingerUp(lm,2) && !fingerUp(lm,3) && fingerUp(lm,4);
}
function isCrossed(lm) {
  const dx = Math.abs(lm[8].x - lm[12].x);
  return fingerUp(lm,1) && fingerUp(lm,2) && dx < 0.04;
}

// 손바닥 방향 (앞/뒤)
function isPalmFacing(lm) {
  return lm[5].z < lm[17].z; // 대략적인 팜 방향
}

// ══════════════════════════════════════════
// 수화 데이터 (일상 단어, 양손 고려)
// 각 제스처는 단순화된 단일손 기준이며 설명으로 양손 동작 안내
// ══════════════════════════════════════════
const SIGNS = [
  // ── 음식 ──
  { cat:'음식', id:'rice',     emoji:'🍚', word:'밥',
    how:'손가락 모두 오므리기',
    tip:'손가락을 둥글게 오므려 그릇 모양을 만드세요. 양손을 마주 보게 합니다.',
    detect: lm => isFist(lm) },
  { cat:'음식', id:'water',    emoji:'💧', word:'물',
    how:'검지 W 모양',
    tip:'검지, 중지, 약지 세 손가락을 펴고 엄지로 소지를 잡으세요. 물 W 표현입니다.',
    detect: lm => isThreeFingersUp(lm) && !thumbOut(lm) },
  { cat:'음식', id:'yummy',    emoji:'😋', word:'맛있어',
    how:'엄지+검지 핀치',
    tip:'엄지와 검지를 맞닿게 핀치 제스처를 만드세요. "맛있다"는 손끝으로 표현합니다.',
    detect: lm => isPinch(lm) },
  { cat:'음식', id:'hungry',   emoji:'🍽️', word:'배고파',
    how:'손바닥으로 배 쓸기',
    tip:'손바닥을 펴고 배 앞에서 원을 그리듯 움직이세요. 여기서는 열린 손바닥으로 인식합니다.',
    detect: lm => isOpenPalm(lm) },
  { cat:'음식', id:'more',     emoji:'✌️', word:'더 줘',
    how:'검지+중지 두 번 구부리기',
    tip:'검지와 중지를 세우고 구부렸다 펴기를 반복하세요.',
    detect: lm => isPeace(lm) },

  // ── 감정/상태 ──
  { cat:'감정', id:'good',     emoji:'👍', word:'좋아',
    how:'엄지 위로',
    tip:'주먹 쥐고 엄지만 위로 세우세요.',
    detect: lm => isThumbsUp(lm) },
  { cat:'감정', id:'bad',      emoji:'👎', word:'싫어',
    how:'엄지 아래로',
    tip:'주먹 쥐고 엄지를 아래로 내리세요.',
    detect: lm => isThumbsDown(lm) },
  { cat:'감정', id:'tired',    emoji:'😫', word:'피곤해',
    how:'손 아래로 축 늘어뜨리기',
    tip:'손목을 아래로 축 늘어뜨리듯 소지를 위로 세우세요.',
    detect: lm => isPinkyUp(lm) },
  { cat:'감정', id:'happy',    emoji:'😊', word:'행복해',
    how:'양손 활짝 + 가슴 위',
    tip:'손바닥을 펴고 가슴 앞에서 위로 올리세요. 한 손으로는 열린 손바닥 위 포지션입니다.',
    detect: lm => allFingersUp(lm) && !thumbOut(lm) && lm[9].y < 0.5 },
  { cat:'감정', id:'love',     emoji:'❤️', word:'사랑해',
    how:'엄지+검지+소지 펴기',
    tip:'엄지, 검지, 소지를 펴고 나머지는 접으세요. ILY 제스처입니다.',
    detect: lm => thumbUp(lm) && fingerUp(lm,1) && !fingerUp(lm,2) && !fingerUp(lm,3) && fingerUp(lm,4) },
  { cat:'감정', id:'sorry',    emoji:'🙏', word:'미안해',
    how:'주먹으로 가슴 두드리기',
    tip:'손을 주먹 쥐고 가슴 앞에 원을 그리듯 움직이세요.',
    detect: lm => isFist(lm) && lm[9].y < 0.45 },
  { cat:'감정', id:'thanks',   emoji:'🤲', word:'감사해',
    how:'손끝을 이마에 갖다 대기',
    tip:'손끝(검지~중지)을 이마에 댔다가 앞으로 내밉니다.',
    detect: lm => isPeace(lm) && lm[8].y < 0.3 },

  // ── 학교 ──
  { cat:'학교', id:'study',    emoji:'📚', word:'공부',
    how:'책 펼치듯 양손 펴기',
    tip:'양손을 펼쳐 책처럼 마주 보게 하세요. 한 손으로는 네 손가락을 펴세요.',
    detect: lm => isFourFingersUp(lm) },
  { cat:'학교', id:'teacher',  emoji:'👩‍🏫', word:'선생님',
    how:'검지로 위 가리키기',

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
let handsModel = null;
let stableCounts = {}; // id -> count
const STABLE = 10;
let lastShown = null;
let history = [];
let focusedId = null;

// ══════════════════════════════════════════
// UI 렌더
// ══════════════════════════════════════════
function renderList() {
  const list = document.getElementById('signList');
  const cats = [...new Set(SIGNS.map(s => s.cat))];
  list.innerHTML = '';
  cats.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'cat-divider';
    div.textContent = cat;
    list.appendChild(div);
    SIGNS.filter(s => s.cat === cat).forEach(s => {
      const item = document.createElement('div');
      item.className = 'sign-item';
      item.id = 'item-' + s.id;
      item.innerHTML = `
        <div class="sign-icon">${s.emoji}</div>
        <div class="sign-info">
          <div class="sign-word">${s.word}</div>
          <div class="sign-how">${s.how}</div>
        </div>
        <div class="sign-check">✓</div>
      `;
      item.onclick = () => focusSign(s.id);
      list.appendChild(item);
    });
  });
}

function focusSign(id) {
  document.querySelectorAll('.sign-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('item-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  const s = SIGNS.find(x => x.id === id);
  if (s) document.getElementById('tipText').textContent = s.tip;
  focusedId = id;
}

function showResult(sign) {
  const rw = document.getElementById('resultWord');
  const rs = document.getElementById('resultSub');
  rw.textContent = sign.emoji + ' ' + sign.word;
  rs.textContent = sign.how;
  rw.classList.add('show');
  rs.classList.add('show');
  setTimeout(() => { rw.classList.remove('show'); rs.classList.remove('show'); }, 2200);

  document.querySelectorAll('.sign-item').forEach(e => e.classList.remove('detected'));
  const el = document.getElementById('item-' + sign.id);
  if (el) { el.classList.add('detected'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function addHistory(sign) {
  history.unshift(sign);
  if (history.length > 10) history.pop();
  const el = document.getElementById('histChips');
  el.innerHTML = history.map(s =>
    `<div class="hist-chip">${s.emoji} ${s.word}</div>`
  ).join('');
}
function clearHist() { history = []; document.getElementById('histChips').innerHTML = ''; }

// ══════════════════════════════════════════
// MediaPipe
// ══════════════════════════════════════════
async function initMP() {
  handsModel = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  handsModel.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });
  handsModel.onResults(onResults);
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('loadMsg').textContent = '준비 완료!';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('hintMsg').style.display = 'block';
}

async function startCamera() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  document.getElementById('loadMsg').textContent = '카메라 연결 중...';
  document.getElementById('spinner').style.display = 'block';
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: {ideal:1280}, height: {ideal:720} }
    });
    video.srcObject = stream;
    await video.play();
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    document.getElementById('startOverlay').classList.add('gone');
    document.getElementById('statusDot').classList.add('on');
    document.getElementById('statusText').textContent = '인식 중';
    const cam = new Camera(video, {
      onFrame: async () => { await handsModel.send({ image: video }); },
      width: canvas.width, height: canvas.height
    });
    cam.start();
  } catch(e) {
    document.getElementById('loadMsg').textContent = '오류: ' + e.message;
    document.getElementById('spinner').style.display = 'none';
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════
// 인식 처리
// ══════════════════════════════════════════
function onResults(results) {
  const canvas = document.getElementById('canvasEl');
  const video = document.getElementById('videoEl');
  const ctx = canvas.getContext('2d');
  if (video.videoWidth > 0 && canvas.width !== video.videoWidth) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.scale(-1, 1);
  ctx.translate(-canvas.width, 0);
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  const hc = document.getElementById('handCount');
  const hands = results.multiHandLandmarks || [];
  const handedness = results.multiHandedness || [];

  if (hands.length > 0) {
    hc.classList.add('has-hands');
    hc.innerHTML = `<div class="hand-dot"></div> 손 ${hands.length}개 감지됨`;
  } else {
    hc.classList.remove('has-hands');
    hc.innerHTML = `<div class="hand-dot"></div> 손을 카메라에 보여주세요`;
    stableCounts = {};
    lastShown = null;
    return;
  }

  // 모든 손 랜드마크 그리기
  ctx.save();
  ctx.scale(-1, 1);
  ctx.translate(-canvas.width, 0);
  hands.forEach((lm, i) => {
    const isRight = handedness[i]?.label === 'Right';
    const color = isRight ? '#e8532a' : '#2a6ee8';
    drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: color + '88', lineWidth: 2 });
    drawLandmarks(ctx, lm, { color, fillColor: color + '44', lineWidth: 1, radius: 4 });

    // 손 라벨 (L/R) - 손목 위치에
    const wrist = lm[0];
    const cx = wrist.x * canvas.width;
    const cy = wrist.y * canvas.height;
    ctx.fillStyle = color;
    ctx.font = 'bold 13px DM Mono, monospace';
    ctx.fillRect(cx - 14, cy - 30, 28, 20);
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.fillText(isRight ? '오른손' : '왼손', cx, cy - 16);
    ctx.textAlign = 'left';
  });
  ctx.restore();

  // 인식: 모든 손에 대해 체크 (첫 번째 매치 우선)
  let detected = null;
  for (const lm of hands) {
    for (const sign of SIGNS) {
      try {
        if (sign.detect(lm)) {
          detected = sign;
          break;
        }
      } catch(e) {}
    }
    if (detected) break;
  }

  if (detected) {
    const id = detected.id;
    stableCounts[id] = (stableCounts[id] || 0) + 1;
    // 다른 제스처 카운트 리셋
    Object.keys(stableCounts).forEach(k => { if (k !== id) stableCounts[k] = 0; });

    if (stableCounts[id] === STABLE) {
      showResult(detected);
      if (lastShown !== id) { addHistory(detected); lastShown = id; }
    }
  } else {
    stableCounts = {};
    lastShown = null;
  }
}

// ══════════════════════════════════════════
// 실행
// ══════════════════════════════════════════
renderList();
initMP();
</script>
